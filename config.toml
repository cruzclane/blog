# The URL the site will be built for
title = "Clane's Notes"
base_url = "https://cruzclane.github.io/blog/"
description = "An area where to store my ideas and notes."

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

default_language = "zh"

# theme = "hook"
# When set to "true", a feed is automatically generated.
generate_feeds = true

# There is also a built-in template "rss.xml" that renders an RSS 2.0 feed.
feed_filenames = ["rss.xml"]

# The number of articles to include in the feed. All items are included if
# this limit is not set (the default).
feed_limit = 20

taxonomies = [{ name = "type" }, { name = "tags" }]

[markdown]
# Unicode emoji equivalent in the rendered Markdown files. (e.g.: :smile: => 😄)
render_emoji = true
# Syntax highlighting configuration (optional)
[markdown.highlighting]
theme = "github-dark"
# light_theme = "github-light"
# dark_theme = "github-dark"

[search]
# Whether to include the title of the page/section in the index
include_title = true
# Whether to include the description of the page/section in the index
include_description = false
# Whether to include the RFC3339 datetime of the page in the search index
include_date = false
# Whether to include the path of the page/section in the index (the permalink is always included)
include_path = false
# Whether to include the rendered content of the page/section in the index
include_content = true


[extra]
# Put all your custom variables here
profile = "/profile.png"
username = "Clane"
img_github = "/static/github.svg"
