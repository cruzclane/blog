<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} {{ config.title }} {% endblock title %}</title>
    <link rel="shortcut icon" href="{{ get_url(path='favicon.ico') }}">
    <link rel="stylesheet" href="{{get_url(path='css/style.css')}}" />
    <script defer src="https://cloud.umami.is/script.js" data-website-id="7f290030-2d06-400a-9b01-af5173f43d75"></script>
  </head>
  <body class="bg-amber-50 text-stone-800">
    <main class="max-w-2xl mx-auto p-4 sm:p-6 flex flex-col gap-4 min-h-screen">
      <header class="flex justify-between items-center py-4">
        <a class="text-2xl sm:text-3xl font-serif" href="{{config.base_url}}">
          <span class="text-stone-800">Clane's</span>
          <span class="text-mist-600 font-bold">Note</span>
        </a>
        <nav class="flex items-center gap-4 text-sm sm:text-base">
            <a href="{{ get_url(path='@/posts/_index.md') | safe }}" class="text-stone-600 hover:text-stone-900">Posts</a>
            <a href="{{ get_url(path='@/books/_index.md') | safe }}" class="text-stone-600 hover:text-stone-900">Books</a>
            <a href="{{ get_url(path=config.feed_filename | default(value='rss.xml')) | safe }}" class="text-stone-600 hover:text-stone-900">RSS</a>
        </nav>
      </header>
      <div class="flex-1">{% block content %} {% endblock %}</div>
      <footer class="text-center text-sm text-gray-500 pb-4">
        © 2026
        <a class="hover:text-gray-800 font-serif" href="{{config.base_url}}">
          <span class="">Clane's</span>
          <span class="">Note</span>
        </a>
      </footer>
    </main>
  </body>
</html>
